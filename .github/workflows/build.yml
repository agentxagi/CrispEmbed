name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            cmake_args: -DGGML_BLAS=OFF -DGGML_LLAMAFILE=ON
            lib_name: libcrispembed.so
          - name: macos-arm64
            os: macos-latest
            cmake_args: -DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON -DGGML_BLAS=ON -DGGML_BLAS_VENDOR=Apple
            lib_name: libcrispembed.dylib
          - name: windows-x86_64
            os: windows-latest
            cmake_args: -DGGML_BLAS=OFF
            lib_name: crispembed.dll

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCRISPEMBED_BUILD_SHARED=ON
          ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./build/crispembed --help 2>&1 || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: .\build\Release\crispembed.exe --help 2>&1 || true
        shell: pwsh

      - name: Upload shared library
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            build/${{ matrix.lib_name }}
            build/Release/${{ matrix.lib_name }}
          if-no-files-found: warn

  build-android:
    name: android-${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_NATIVE_API_LEVEL=24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCRISPEMBED_BUILD_SHARED=ON \
            -DGGML_LLAMAFILE=OFF
          cmake --build build -j4

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: android-${{ matrix.abi }}
          path: build/libcrispembed.so
          if-no-files-found: warn

  build-ios:
    name: ios-arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build
        run: |
          # Use Unix Makefiles (not Xcode) to avoid MACOSX_BUNDLE issues
          cmake -S . -B build \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path) \
            -DCMAKE_C_COMPILER=$(xcrun --sdk iphoneos -f clang) \
            -DCMAKE_CXX_COMPILER=$(xcrun --sdk iphoneos -f clang++) \
            -DCMAKE_BUILD_TYPE=Release \
            -DCRISPEMBED_BUILD_SHARED=OFF \
            -DGGML_METAL=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON
          cmake --build build -j4

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: ios-arm64
          path: build/libcrispembed-static.a
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Bundle all native libraries into the Flutter plugin's platform directories
  # so that `flutter build` can find them.
  # -------------------------------------------------------------------------
  bundle-flutter:
    name: Bundle Flutter plugin
    runs-on: ubuntu-latest
    needs: [build, build-android, build-ios]
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place artifacts in Flutter plugin dirs
        run: |
          PLUGIN=flutter/crispembed

          # Linux
          cp artifacts/linux-x86_64/libcrispembed.so \
             $PLUGIN/linux/lib/libcrispembed.so

          # macOS
          cp artifacts/macos-arm64/libcrispembed.dylib \
             $PLUGIN/macos/Libs/libcrispembed.dylib

          # Windows
          cp artifacts/windows-x86_64/crispembed.dll \
             $PLUGIN/windows/lib/crispembed.dll

          # iOS
          cp artifacts/ios-arm64/libcrispembed-static.a \
             $PLUGIN/ios/Libs/libcrispembed-static.a

          # Android (per-ABI)
          for abi in arm64-v8a armeabi-v7a x86_64; do
            cp artifacts/android-${abi}/libcrispembed.so \
               $PLUGIN/android/src/main/jniLibs/${abi}/libcrispembed.so
          done

          echo "=== Flutter plugin native libraries ==="
          find $PLUGIN -name '*.so' -o -name '*.dylib' -o -name '*.dll' -o -name '*.a' | sort

      - name: Upload bundled plugin
        uses: actions/upload-artifact@v7
        with:
          name: flutter-plugin-bundled
          path: flutter/crispembed/
